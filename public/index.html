    /* v1.0: 채팅 목록 — telegram-tt 스타일 */
    .chat-item { color: #000; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    .chat-item:hover { background: #f4f4f5; }
    .chat-item.active { background: #3390ec; color: #fff; }

    .chat-item.active .chat-item-msg { color: rgba(255,255,255,0.8); }
    .chat-item-inner { display: flex; align-items: center; gap: 10px; }
    .chat-avatar-wrap { position: relative; flex-shrink: 0; }
    .chat-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 18px;
      object-fit: cover; flex-shrink: 0;
    }
    img.chat-avatar { background: #ccc; }
    /* v0.13: 저장된 메시지(Saved Messages) 전용 아바타 — 텔레그램 공식 디자인 */
    .chat-avatar.saved-messages,
    .chat-header-avatar.saved-messages {

      color: #ffffff;

    }

    img.chat-header-avatar { background: #ccc; }
    .chat-header-avatar.saved-messages { font-size: 20px; }
    .chat-avatar.saved-messages::before,
    .chat-header-avatar.saved-messages::before {
      font-family: "icons" !important;  /* telegram-tt-icons.css @font-face 와 일치 */
      content: "\f11b";
      speak: none;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
    }
    .avatar-online-dot {
      position: absolute; bottom: 1px; right: 1px;

    }
    .chat-item-body { flex: 1; min-width: 0; }

    .chat-item-time { font-size: 12px; color: #707579; flex-shrink: 0; margin-left: 8px; }
    .chat-item-bottom { display: flex; justify-content: space-between; align-items: center; }
    .chat-item-msg { font-size: 14px; color: #707579; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .unread-badge {
      background: #3390ec; color: white; font-size: 12px; font-weight: 600;
      min-width: 22px; height: 22px; border-radius: 11px;

    }
    .chat-item.active .unread-badge { background: white; color: #3390ec; }
    .message-bubble {
      max-width: 70% !important;

      word-break: break-word !important;
      overflow-wrap: anywhere !important;
      text-align: left !important;
      display: inline-block !important;
      padding: 0.35rem 0.6rem !important;

      -webkit-touch-callout: none;
      -webkit-user-select: none;

    /* 2026-05-13: 메시지 가로 오버플로우 방지 */

    /* 2026-05-13 v0.10.2: 상위 flex 컨테이너 폭이 컨텐츠에 끌려가지 않도록 min-width:0 강제 */

    /* 최상위 viewport flex(body.h-screen.flex)의 모든 직계 flex item */
    body.h-screen.flex > * {
      min-width: 0;
    }

    /* .message-panel 내부 column flex의 모든 직계 자식 (#messageList 부모 익명 div 포함) */

      min-width: 0;
    }

    /* messageList 자체에도 명시 */
    #messageList {
      min-width: 0;
    }

    /* 안전망: 어떤 경로로든 가로 스크롤이 새도 viewport 단위에서 잘리도록 */
    html, body {
      overflow-x: hidden;
      max-width: 100vw;
    }
    .message-in { background: #ffffff; color: #000; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

    /* v0.8: 그룹 채팅 발신자 이름 */

    .forward-label { font-size: 0.75rem; color: #8b9cc7; margin-bottom: 4px; padding-bottom: 3px; border-bottom: 1px solid rgba(139,156,199,0.2); }
    /* telegram-tt MessageList.scss 포팅:
     * 원본: .MessageList { overflow-y: scroll; }
     *       .messages-container { display: flex; flex-direction: column; justify-content: flex-end; min-height: 100%; }
     *       .with-bottom-snap { scroll-snap-type: y proximity; }
     *       .fab-trigger { scroll-snap-align: end; }
     * 원리: flex column + justify-content:flex-end로 메시지를 아래 정렬하고,
     *       scroll-snap으로 이미지 로드 등 높이 변화 시에도 바닥 고정.
     *       .fab-trigger(= 맨 마지막 요소)에 scroll-snap-align: end를 걸어서 스냅 타겟 지정. */
    #messageList {
      background: #c8dae4;
      position: relative;
      overflow-x: hidden;
      overflow-y: scroll;
    }
    #messageList.with-bottom-snap {
      scroll-snap-type: y proximity;
    }
    #messageList > .messages-container {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 100%;
    }
    #messageList > .messages-container > .snap-trigger {
      scroll-snap-align: end;
      height: 1px;
      flex-shrink: 0;
    }

    /* v0.3: 컨텍스트 메뉴 — 라이트모드 */
    .context-menu {

    /* 선택 툴바 */
    .select-toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;

    /* v1.0: 이미지 뷰어 — 공식 스타일 */
    .image-viewer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;

      border-radius: 4px;

    }
    .image-viewer-close {
      position: absolute;

      right: 16px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;

      height: 44px;

    .image-viewer-download {

      top: 16px;

      border: none;
      color: white;

      height: 44px;

    .msg-code {

    }
    .msg-pre {
      background: rgba(0,0,0,0.06); padding: 8px 12px; border-radius: 6px;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
      font-size: 0.9em; margin: 4px 0;
      white-space: pre-wrap;          /* pre → pre-wrap: 들여쓰기 유지 + 자동 wrap */
      word-break: break-word;          /* 일반 텍스트는 단어 경계에서 깨짐 */
      overflow-wrap: anywhere;         /* 매우 긴 단일 토큰(URL, 명령어 등) 강제 깨짐 */
      overflow-x: hidden;              /* auto → hidden: wrap 됐으므로 가로 스크롤 불필요 */
      max-width: 100%;                 /* 부모 .message-bubble 폭 안에 강제 */
    }
    .msg-mention { color: #3390ec; font-weight: 500; cursor: pointer; }
    .msg-hashtag { color: #3390ec; cursor: pointer; }

    <img id="viewerImage" src="">

  <script>
    const socket = io({
      transports: ['polling'],  // Cloudflare Tunnel WSS 미지원 → polling 전용
      upgrade: false,
      reconnection: true,
      reconnectionAttempts: 10,
      reconnectionDelay: 2000,
      timeout: 30000
    });
    // Socket.io 연결 상태 디버그
    socket.on('connect', () => {
      console.log('[Socket.io] ✅ 연결됨, id:', socket.id, 'transport:', socket.io.engine.transport.name);
      // 계정 목록 동기화 + 활성 계정이 localStorage 와 다르면 전환 요청
      socket.emit('getAccounts', (resp) => {
        if (!resp?.accounts) return;
        knownAccounts = resp.accounts;
        const wantActive = localStorage.getItem('tg_active_account') || 'main';
        const serverActive = resp.activeAccountId;
        if (wantActive !== serverActive) {
          requestSwitchAccount(wantActive);
        } else {
          activeAccountId = serverActive;
          renderAccountSwitcherMenu();
          updateAccountSwitcherUI();
          updateAuthHint();
        }
      });
    });
    // DEBUG: 모든 이벤트 로깅 (chatAction 문제 진단용)
    socket.onAny((event, ...args) => {
      if (event === 'chatUpdate') return; // 너무 많아서 스킵
      if (event === 'chatAction') {
        console.log('[DEBUG onAny] chatAction:', JSON.stringify(args[0]).substring(0, 200));
      }
    });
    socket.on('disconnect', (reason) => {
      console.log('[Socket.io] ❌ 연결 해제:', reason);
    });
    socket.on('connect_error', (err) => {
      console.log('[Socket.io] ⚠️ 연결 에러:', err.message);
    });
    socket.io.engine && socket.io.engine.on('upgrade', (transport) => {
      console.log('[Socket.io] 🔄 transport 업그레이드:', transport.name);
    });

    let currentChatId = null;
    let currentChatLastRead = null;  // v0.6: 읽음 표시용
    let currentChatType = 'private'; // v0.8: 채팅 타입 (private/basicGroup/supergroup/channel)
    const draftMessages = {}; // 세션별 임시 메시지 저장
    let pendingImage = null; // 붙여넣기 대기 중인 이미지
    const LAST_CHAT_KEY = 'telegram_last_chat';
    
    // v0.3: 컨텍스트 메뉴 & 답장
    let selectedMessage = null; // 현재 선택된 메시지
    let replyingTo = null; // 답장 대상 메시지
    const messagesCache = {}; // 메시지 캐시 (id -> msg)

    // 다중 선택 모드
    let isSelectMode = false; // 선택 모드 활성화 여부
    const selectedMessages = new Set(); // 선택된 메시지 ID 집합

    // === v0.12 다계정 UI ===
    let activeAccountId = localStorage.getItem('tg_active_account') || 'main';
    let knownAccounts = [];   // [{id, label, isAuthorized, authState, ...}]

    function getAccountLabel(id) {
      const a = knownAccounts.find(x => x.id === id);
      return a?.label || (id === 'main' ? '본계정' : id === 'sub' ? '부계정' : id);
    }

    function showAuthScreen() {
      document.getElementById('mainScreen').classList.add('hidden');
      document.getElementById('authScreen').classList.remove('hidden');
    }

    function updateAccountSwitcherUI() {
      const labelEl = document.getElementById('accountSwitcherLabel');
      const dotEl = document.getElementById('accountSwitcherDot');
      if (labelEl) labelEl.textContent = getAccountLabel(activeAccountId);
      if (dotEl) {
        dotEl.className = 'w-2 h-2 rounded-full ' + (activeAccountId === 'main' ? 'bg-green-500' : 'bg-blue-500');
      }
    }

    function renderAccountSwitcherMenu() {
      const listEl = document.getElementById('accountSwitcherList');
      if (!listEl) return;
      listEl.innerHTML = '';
      for (const a of knownAccounts) {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'w-full text-left px-3 py-2 hover:bg-gray-100 flex items-center justify-between text-sm';
        const status = a.isAuthorized ? '🟢 인증됨'
                     : (a.authState === 'authorizationStateWaitCode' ? '🟡 코드 대기'
                     : (a.authState === 'authorizationStateWaitPassword' ? '🟡 비밀번호 대기'
                     : '🔒 로그인 필요'));
        item.innerHTML = `
          <span class="flex items-center gap-2">
            <span class="font-medium text-gray-900">${a.label}</span>
            <span class="text-xs text-gray-500">${a.id}</span>
          </span>
          <span class="text-xs text-gray-500">${status}${a.id === activeAccountId ? ' ✓' : ''}</span>
        `;
        item.addEventListener('click', () => {
          document.getElementById('accountSwitcherMenu').classList.add('hidden');
          if (a.id === activeAccountId) return;
          requestSwitchAccount(a.id);
        });
        listEl.appendChild(item);
      }
    }

    function requestSwitchAccount(account) {
      console.log('[account] switching to', account);
      // 화면 상태 초기화
      resetChatViewState();
      socket.emit('switchAccount', { account }, (resp) => {
        if (!resp || !resp.ok) {
          console.error('[account] switch failed:', resp?.error);
          alert('계정 전환 실패: ' + (resp?.error || 'unknown'));
          return;
        }
        activeAccountId = account;
        localStorage.setItem('tg_active_account', account);
        updateAccountSwitcherUI();
        updateAuthHint();
        // 새 계정의 인증 상태 / 채팅 목록 재조회
        socket.emit('getAuthState');
        socket.emit('getAccounts', (r2) => {
          if (r2?.accounts) { knownAccounts = r2.accounts; renderAccountSwitcherMenu(); updateAccountSwitcherUI(); }
        });
      });
    }

    function resetChatViewState() {
      // 채팅 목록 / 메시지 영역 / 캐시 초기화
      const chatList = document.getElementById('chatList');
      if (chatList) chatList.innerHTML = '';
      const messageList = document.getElementById('messageList');
      if (messageList) messageList.innerHTML = '<div class="messages-container space-y-2"><div class="snap-trigger"></div></div>';
      if (typeof chatsCache === 'object' && chatsCache) {
        for (const k of Object.keys(chatsCache)) delete chatsCache[k];
      }
      // 현재 채팅 선택 해제
      if (typeof currentChatId !== 'undefined') currentChatId = null;
      if (typeof oldestMessageId !== 'undefined') oldestMessageId = 0;
      // 채팅 제목 영역
      const chatTitle = document.getElementById('chatTitle');
      if (chatTitle) chatTitle.textContent = '채팅을 선택하세요';
      const chatStatus = document.getElementById('chatStatus');
      if (chatStatus) chatStatus.textContent = '';
    }

    function updateAuthHint() {
      const el = document.getElementById('authAccountHint');
      const lab = document.getElementById('authAccountHintLabel');
      if (!el || !lab) return;
      if (activeAccountId === 'main') {
        el.classList.add('hidden');
      } else {
        lab.textContent = getAccountLabel(activeAccountId);
        el.classList.remove('hidden');
      }
    }

    // 드롭다운 토글 + 외부 클릭 닫힘
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('accountSwitcherBtn');
      const menu = document.getElementById('accountSwitcherMenu');
      if (btn && menu) {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.classList.toggle('hidden');
        });
        document.addEventListener('click', (e) => {
          if (!menu.contains(e.target) && !btn.contains(e.target)) menu.classList.add('hidden');
        });
      }
    });

    // accountSwitched: 서버 활성 계정 변경 브로드캐스트 (처리 전용 — 정보/상태 갱신)
    socket.on('accountSwitched', (payload) => {
      if (!payload || !payload.account) return;
      activeAccountId = payload.account;
      localStorage.setItem('tg_active_account', payload.account);
      updateAccountSwitcherUI();
      updateAuthHint();
      socket.emit('getAccounts', (r) => {
        if (r?.accounts) { knownAccounts = r.accounts; renderAccountSwitcherMenu(); updateAccountSwitcherUI(); }
      });
    });

    // 인증 상태 처리
    socket.on('authState', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { state } = payload || {};
      console.log('Auth state:', state, payload?.account ? '(' + payload.account + ')' : '');
      hideAllForms();

      switch (state) {
        case 'authorizationStateWaitPhoneNumber':
          showAuthScreen();
          updateAuthHint();
          document.getElementById('phoneForm').classList.remove('hidden');
          break;
        case 'authorizationStateWaitCode':
          showAuthScreen();
          updateAuthHint();
          document.getElementById('codeForm').classList.remove('hidden');
          break;
        case 'authorizationStateWaitPassword':
          showAuthScreen();
          updateAuthHint();
          document.getElementById('passwordForm').classList.remove('hidden');
          break;
        case 'authorizationStateReady':
          showMainScreen();
          socket.emit('getChats');
          socket.emit('getAccounts', (r) => {
            if (r?.accounts) { knownAccounts = r.accounts; renderAccountSwitcherMenu(); updateAccountSwitcherUI(); }
          });
          break;
      }
    });

    socket.on('authorized', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      showMainScreen();
      socket.emit('getChats');
      // 계정 정보 갱신 (isAuthorized 표시 반영)
      socket.emit('getAccounts', (r) => {
        if (r?.accounts) { knownAccounts = r.accounts; renderAccountSwitcherMenu(); updateAccountSwitcherUI(); }
      });
    });

    socket.on('needPhone', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      hideAllForms();
      showAuthScreen();
      updateAuthHint();
      document.getElementById('phoneForm').classList.remove('hidden');
    });

    socket.on('needCode', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      hideAllForms();
      showAuthScreen();
      updateAuthHint();
      document.getElementById('codeForm').classList.remove('hidden');
    });

    socket.on('needPassword', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      hideAllForms();
      showAuthScreen();
      updateAuthHint();
      document.getElementById('passwordForm').classList.remove('hidden');
    });

    socket.on('error', (msg) => {
      const errEl = document.getElementById('authError');
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
    });

    // 채팅 목록 수신 (v0.6: 온라인 상태 포함)
    let chatsCache = {};  // 채팅 정보 캐시

    // v0.15: 채팅 정렬 — 실제 텔레그램/telegram-tt 와 동일
    // 고정 채팅 최상단, 그 외 chatListMain.order 내림차순 (int64 BigInt 비교)
    function compareChatsForList(a, b) {
      const ap = !!(a && a._isPinned);
      const bp = !!(b && b._isPinned);
      if (ap && !bp) return -1;
      if (!ap && bp) return 1;
      let ao, bo;
      try { ao = BigInt(a?._order || '0'); } catch (_) { ao = 0n; }
      try { bo = BigInt(b?._order || '0'); } catch (_) { bo = 0n; }
      if (ao > bo) return -1;
      if (ao < bo) return 1;
      return 0;
    }

    function reorderChatList() {
      const listEl = document.getElementById('chatList');
      if (!listEl) return;
      const items = Array.from(listEl.querySelectorAll('.chat-item'));
      if (items.length === 0) return;
      items.sort((a, b) => {
        const ac = chatsCache[a.dataset.chatId];
        const bc = chatsCache[b.dataset.chatId];
        return compareChatsForList(ac, bc);
      });
      const frag = document.createDocumentFragment();
      items.forEach(el => frag.appendChild(el));
      listEl.appendChild(frag);
    }

    socket.on('chats', (chats) => {
      // 캐시 저장
      chats.forEach(c => chatsCache[c.id] = c);

      // v0.15: 초기 정렬 명시 (서버는 이미 순서대로 보내지만 BigInt 기준으로 보장)
      const sortedChats = [...chats].sort(compareChatsForList);

      const listEl = document.getElementById('chatList');
      // v1.0: 텔레그램 스타일 아바타 색상 (peer별)
      const avatarColors = ['#c03d33','#4fad2d','#d09306','#168acd','#8544d6','#cd4073','#2996ad','#ce671b'];
      function getAvatarColor(id) { return avatarColors[Math.abs(id) % avatarColors.length]; }

      listEl.innerHTML = sortedChats.map(chat => {
        const lastMsg = chat.last_message?.content?.text?.text || '';
        
        // 시간
        let timeStr = '';
        if (chat.last_message?.date) {
          const d = new Date(chat.last_message.date * 1000);
          const now = new Date();
          const isToday = d.toDateString() === now.toDateString();
          if (isToday) {
            const h = d.getHours(), m = d.getMinutes();
            const ampm = h < 12 ? '오전' : '오후';
            timeStr = `${ampm} ${h % 12 || 12}:${String(m).padStart(2, '0')}`;
          } else {
            timeStr = `${d.getMonth()+1}/${d.getDate()}`;
          }
        }
        
        // 아바타 (v0.13: 저장된 메시지는 전용 아이콘/제목)
        const displayTitle = chat._displayTitle || chat.title;
        const initial = Array.from(displayTitle || '?')[0] || '?';
        const avatarBg = getAvatarColor(chat.id);
        let avatarHtml;
        if (chat._isSavedMessages) {
          avatarHtml = `<div class="chat-avatar saved-messages"></div>`;
        } else if (chat._avatarData) {
          avatarHtml = `<img src="${chat._avatarData}" class="chat-avatar">`;
        } else {
          avatarHtml = `<div class="chat-avatar" style="background: ${avatarBg};">${initial}</div>`;
        }
        
        // 온라인 표시
        const onlineDotHtml = chat._isOnline ? '<span class="avatar-online-dot"></span>' : '';
        
        // 안읽은 배지
        const unread = chat._unreadCount || 0;
        const badgeHtml = unread > 0 ? `<span class="unread-badge">${unread > 99 ? '99+' : unread}</span>` : '';
        
        return `<div class="chat-item p-3 cursor-pointer" data-chat-id="${chat.id}" 
          data-status="${escapeHtml(chat._statusText || '')}" data-online="${chat._isOnline}"
          onclick="openChat(${chat.id}, '${escapeHtml(displayTitle).replace(/'/g, "\\'")}')">
          <div class="chat-item-inner">
            <div class="chat-avatar-wrap">${avatarHtml}${onlineDotHtml}</div>
            <div class="chat-item-body">
              <div class="chat-item-top">
                <span class="chat-item-title">${escapeHtml(displayTitle)}</span>
                <span class="chat-item-time">${timeStr}</span>
              </div>
              <div class="chat-item-bottom">
                <span class="chat-item-msg">${escapeHtml(lastMsg.replace(/\n/g, ' '))}</span>
                ${badgeHtml}
              </div>
            </div>
          </div>
        </div>`;
      }).join('');
      
      // 마지막 대화 세션 자동 열기
      const lastChatId = localStorage.getItem(LAST_CHAT_KEY);
      if (lastChatId && !currentChatId) {
        const lastChat = sortedChats.find(c => String(c.id) === lastChatId);
        if (lastChat) {
          openChat(lastChat.id, lastChat._displayTitle || lastChat.title);
          // 해당 항목 active 표시
          const el = document.querySelector(`[data-chat-id="${lastChat.id}"]`);
          if (el) el.classList.add('active');
        }
      }
    });

    // 인피니티 스크롤 상태
    let oldestMessageId = 0;
    let isLoadingMore = false;
    let hasMoreMessages = true;

    // v0.8: 발신자별 색상 (텔레그램 스타일)
    const senderColors = [
      '#c03d33', '#4fad2d', '#d09306', '#168acd',
      '#8544d6', '#cd4073', '#2996ad', '#ce671b'
    ];
    function getSenderColor(userId) {
      return senderColors[Math.abs(userId) % senderColors.length];
    }

    // 메시지 HTML 생성 함수
    function renderMessage(msg) {
      // 캐시에 저장
      messagesCache[msg.id] = msg;
      
      const isOut = msg.is_outgoing;
      let content = '';
      const time = msg.date ? formatTime(msg.date) : '';
      
      /* v0.3 + telegram-tt EmbeddedMessage.tsx 포팅:
       * 원본: src/components/common/embedded/EmbeddedMessage.tsx
       *   - renderSender(): sender title 표시 (이름)
       *   - renderTextContent(): MessageSummary로 원글 텍스트 요약 표시
       *   - 미디어면 getMediaContentTypeDescription으로 "[사진]", "[동영상]" 등 표시
       * 포팅: reply-quote 내에 이름 + 텍스트 모두 표시, 텍스트 없으면 '[미디어]' 폴백
       */
      let replyHtml = '';
      if (msg._replyTo) {
        // 서버에서 조회한 답장 원본
        const replyName = msg._replyTo.isOutgoing ? '나' : (msg._replyTo.senderName || '상대방');
        const replyText = (msg._replyTo.text || '[미디어]').substring(0, 80);
        replyHtml = `<div class="reply-quote" onclick="scrollToMessage(${msg._replyTo.id}, ${msg.id})"><span class="reply-quote-name">${escapeHtml(replyName)}</span><div class="reply-quote-text">${escapeHtml(replyText)}</div></div>`;
        console.log('[Reply render]', msg.id, '→', msg._replyTo.id, 'text:', replyText.substring(0, 30));
      } else if (msg.reply_to?.message_id && messagesCache[msg.reply_to.message_id]) {
        // 캐시에서 찾기 (폴백)
        const replyMsg = messagesCache[msg.reply_to.message_id];
        const replyName = replyMsg.is_outgoing ? '나' : (replyMsg._senderName || '상대방');
        const replyText = (replyMsg.content?.text?.text || replyMsg.content?.caption?.text || '[미디어]').substring(0, 80);
        replyHtml = `<div class="reply-quote" onclick="scrollToMessage(${replyMsg.id}, ${msg.id})"><span class="reply-quote-name">${escapeHtml(replyName)}</span><div class="reply-quote-text">${escapeHtml(replyText)}</div></div>`;
      } else if (msg.reply_to?.message_id) {
        // reply 원본을 못 가져온 경우에도 표시
        replyHtml = `<div class="reply-quote"><span class="reply-quote-name">답장</span><div class="reply-quote-text">[원본 메시지 로드 실패]</div></div>`;
      }
      
      if (msg._imageData) {
        const caption = msg.content?.caption?.text || '';
        // v1.0: 이미지 클릭 시 원본 로드 뷰어 열기
        content = `<img class="message-image max-w-full rounded-lg mb-1" style="max-height: 300px;" data-img-id="${msg.id}" data-lazy-src="1" onclick="openImageViewer(this.src, event, ${msg.id})">`;
        if (caption) content += `<div>${escapeHtml(caption)}</div>`;
      } else if (msg.content?._ === 'messageDocument') {
        // v0.4: 파일 메시지
        const doc = msg.content.document;
        const fileName = doc?.file_name || '파일';
        const fileSize = formatFileSize(doc?.document?.size || 0);
        const fileId = doc?.document?.id || 0;
        const caption = msg.content?.caption?.text || '';
        content = `<div class="file-message" onclick="downloadFile(${msg.id}, ${fileId}, '${escapeHtml(fileName).replace(/'/g, "\\'")}')">
          <span class="file-message-icon">${getFileIcon(fileName)}</span>
          <div class="file-message-info">
            <div class="file-message-name">${escapeHtml(fileName)}</div>
            <div class="file-message-size">${fileSize}</div>
          </div>
          <span class="file-message-download">⬇️</span>
        </div>`;
        if (caption) content += `<div class="mt-1">${escapeHtml(caption)}</div>`;
      } else if (msg.content?.text?.text) {
        content = renderFormattedText(msg.content.text);
      } else {
        content = '<span class="text-gray-400">[미디어]</span>';
      }
      
      // v0.6: 읽음 표시 (내 메시지만)
      let readStatus = '';
      if (isOut) {
        const isRead = currentChatLastRead && msg.id <= currentChatLastRead;
        readStatus = isRead 
          ? '<span class="read-status read">✓✓</span>' 
          : '<span class="read-status">✓</span>';
      }
      
      // v0.8: 그룹 채팅 발신자 이름 (상대방 메시지만)
      let senderHtml = '';
      const isGroupChat = currentChatType === 'basicGroup' || currentChatType === 'supergroup';
      if (isGroupChat && !isOut && msg._senderName) {
        const senderColor = getSenderColor(msg._senderId || 0);
        senderHtml = `<div class="sender-name" style="color: ${senderColor}">${escapeHtml(msg._senderName)}</div>`;
      }
      
      // v0.9: 전달 메시지 표시
      let forwardHtml = '';
      if (msg._forwardFrom) {
        forwardHtml = `<div class="forward-label">↪️ 전달됨: <b>${escapeHtml(msg._forwardFrom)}</b></div>`;
      }

      // v0.9: 각 메시지를 독립 컨테이너로 감싸서 HTML 깨짐 방지
      const bubble = document.createElement('div');
      bubble.className = `flex ${isOut ? 'justify-end' : 'justify-start'}`;
      bubble.setAttribute('data-msg-id', msg.id);
      bubble.setAttribute('oncontextmenu', `showContextMenu(event, ${msg.id})`);
      bubble.setAttribute('ontouchstart', `handleTouchStart(event, ${msg.id})`);
      bubble.setAttribute('ontouchmove', `handleTouchMove(event)`);
      bubble.setAttribute('ontouchend', `handleTouchEnd(event)`);
      bubble.setAttribute('onclick', `handleMessageClick(${msg.id})`);
      bubble.innerHTML = `<div class="message-bubble ${isOut ? 'message-out' : 'message-in'} rounded-lg">${senderHtml}${forwardHtml}${replyHtml}${content}<span class="msg-time">${time}${readStatus}</span></div>`;
      return bubble.outerHTML;
    }

    // v0.8: 활성 채팅에 단일 메시지를 직접 append (getMessages round-trip 제거)
    // 'messages' 핸들러의 renderMessagesWithDates 루프와 동일한 렌더 규칙을 따른다.
    function appendMessageToActiveChat(msg) {
      const listEl = document.getElementById('messageList');
      if (!listEl) return;
      const containerEl = listEl.querySelector('.messages-container');
      if (!containerEl) return;

      // 직전 메시지와 날짜가 다르면 날짜 구분선 삽입
      const existing = containerEl.querySelectorAll('[data-msg-id]');
      let needDateSeparator = true;
      if (existing.length > 0) {
        const lastMsgEl = existing[existing.length - 1];
        const lastId = parseInt(lastMsgEl.getAttribute('data-msg-id'));
        const lastMsg = messagesCache[lastId];
        if (lastMsg && lastMsg.date && msg.date) {
          needDateSeparator = isDifferentDay(lastMsg.date, msg.date);
        }
      }

      const html = (needDateSeparator ? renderDateSeparator(msg.date) : '') + renderMessage(msg);
      const snapTrigger = containerEl.querySelector('.snap-trigger');
      if (snapTrigger) {
        snapTrigger.insertAdjacentHTML('beforebegin', html);
      } else {
        containerEl.insertAdjacentHTML('beforeend', html);
      }
    }

    // v0.8: 사용자가 바닥 근처(200px 이내)일 때만 자동 스크롤
    function maybeAutoScrollToBottom() {
      const listEl = document.getElementById('messageList');
      if (!listEl) return;
      const distFromBottom = listEl.scrollHeight - listEl.scrollTop - listEl.clientHeight;
      if (distFromBottom < 200) {
        listEl.scrollTop = listEl.scrollHeight;
      }
    }

    // v0.8: chatUpdate 사이드바 부분 갱신 — 'chats' 핸들러의 last_message 영역과 동일 포맷
    function updateChatItemLastMessage(chatEl, lastMessage) {
      if (!chatEl || !lastMessage) return;
      const msgEl = chatEl.querySelector('.chat-item-msg');
      if (msgEl) {
        const preview = (lastMessage.content?.text?.text || '').replace(/\n/g, ' ');
        msgEl.textContent = preview;
      }
      const timeEl = chatEl.querySelector('.chat-item-time');
      if (timeEl && lastMessage.date) {
        const d = new Date(lastMessage.date * 1000);
        const now = new Date();
        const isToday = d.toDateString() === now.toDateString();
        let timeStr;
        if (isToday) {
          const h = d.getHours(), m = d.getMinutes();
          const ampm = h < 12 ? '오전' : '오후';
          timeStr = `${ampm} ${h % 12 || 12}:${String(m).padStart(2, '0')}`;
        } else {
          timeStr = `${d.getMonth()+1}/${d.getDate()}`;
        }
        timeEl.textContent = timeStr;
      }
    }

    // 메시지 수신
    socket.on('messages', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { chatId, messages, isHistory = false, lastReadOutbox, chatType } = payload || {};
      // v0.6: 읽음 상태 저장 (호환성 유지)
      if (lastReadOutbox) {
        currentChatLastRead = lastReadOutbox;
      }
      // v0.8: 채팅 타입 저장
      if (chatType) {
        currentChatType = chatType;
      }
      if (chatId !== currentChatId) return;
      
      // 읽음 처리: 받은 메시지 ID들을 서버에 전달
      if (messages && messages.length > 0) {
        const msgIds = messages.map(m => m.id).filter(id => id);
        if (msgIds.length > 0) {
          socket.emit('markRead', { chatId, messageIds: msgIds });
        }
      }
      
      const listEl = document.getElementById('messageList');
      isLoadingMore = false;
      
      // messages가 없거나 빈 배열인 경우
      if (!messages || messages.length === 0) {
        if (!isHistory) {
          listEl.innerHTML = '<div class="messages-container space-y-2"><div class="text-center text-gray-400">메시지가 없습니다</div><div class="snap-trigger"></div></div>';
        }
        hasMoreMessages = false;
        return;
      }
      
      // 복사본 만들어서 reverse (원본 수정 방지)
      const sortedMessages = [...messages].reverse();
      
      // 가장 오래된 메시지 ID 저장 (다음 로드용)
      const firstMsgId = messages[messages.length - 1]?.id || 0;
      
      // v0.9: 이미지 lazy src + DOM 기반 렌더링 (HTML 깨짐 방지)
      const pendingImages = {};
      function renderMessagesWithDates(msgs) {
        const container = document.createElement('div');
        let lastDate = null;
        for (const msg of msgs) {
          const msgDate = formatDate(msg.date);
          if (msgDate !== lastDate) {
            container.insertAdjacentHTML('beforeend', renderDateSeparator(msg.date));
            lastDate = msgDate;
          }
          if (msg._imageData) {
            pendingImages[msg.id] = msg._imageData;
          }
          // 각 메시지를 독립 파싱하여 DOM에 추가 (한 메시지의 HTML 오류가 다른 메시지에 영향 방지)
          const wrapper = document.createElement('div');
          wrapper.innerHTML = renderMessage(msg);
          while (wrapper.firstChild) {
            container.appendChild(wrapper.firstChild);
          }
        }
        return container.innerHTML;
      }
      function applyLazyImages() {
        document.querySelectorAll('img[data-lazy-src]').forEach(img => {
          const msgId = img.getAttribute('data-img-id');
          if (msgId && pendingImages[msgId]) {
            img.src = pendingImages[msgId];
            img.removeAttribute('data-lazy-src');
          }
        });
      }
      
      /* telegram-tt MessageList.tsx + MessageList.scss 포팅:
       *
       * 원본 소스: src/components/middle/MessageList.tsx 줄 609-763
       *   - useLayoutEffectWithPrevDeps: messageIds 변경 시 스크롤 복원
       *   - scrollOffsetRef = scrollHeight - scrollTop (바닥으로부터의 거리)
       *   - isViewportNewest일 때: scrollHeight - offsetHeight로 맨 아래 이동
       *   - 그 외: anchor element의 getBoundingClientRect 변화량으로 복원
       *   - 최종 적용: resetScroll(container, Math.ceil(newScrollTop))
       *
       * 원본 소스: src/components/middle/MessageList.scss 줄 37-57
       *   - .with-bottom-snap { scroll-snap-type: y proximity; }
       *   - .fab-trigger { scroll-snap-align: end; }
       *   → 이미지 로드 등 높이 변화 시 CSS가 자동으로 바닥 유지
       *
       * 원본 소스: src/util/resetScroll.ts
       *   - container.scrollTop = scrollTop (iOS는 overflow:hidden 토글)
       *
       * 포팅 방식:
       *   - messages-container(flex column, justify-content:flex-end) + snap-trigger(scroll-snap-align:end) 구조
       *   - 초기 로드: messages-container 내부에 렌더링 → snap이 자동으로 바닥 고정
       *   - 히스토리 로드: 앵커 기반 스크롤 복원 (anchorTop 차이로 보정)
       *   - with-bottom-snap 클래스로 CSS scroll-snap 활성화
       */
      const containerEl = listEl.querySelector('.messages-container') || listEl;
      
      if (isHistory) {
        // 이전 메시지 로드: 위에 추가 (telegram-tt 앵커 패턴)
        // 원본: MessageList.tsx 줄 722-724 — anchor.getBoundingClientRect().top 변화량으로 보정
        const html = renderMessagesWithDates(sortedMessages);
        
        // 앵커: 현재 첫 번째 메시지의 위치 기억
        const firstMsg = containerEl.querySelector('.message-list-item');
        const anchorTop = firstMsg ? firstMsg.getBoundingClientRect().top : 0;
        
        // snap 일시 비활성화 (위쪽 삽입 시 snap이 바닥으로 끌어당기는 것 방지)
        listEl.classList.remove('with-bottom-snap');
        
        containerEl.insertAdjacentHTML('afterbegin', html);
        applyLazyImages();
        
        // 앵커 기반 스크롤 복원
        if (firstMsg) {
          const newAnchorTop = firstMsg.getBoundingClientRect().top;
          listEl.scrollTop += (newAnchorTop - anchorTop);
        }
        
        // snap 복원
        requestAnimationFrame(() => listEl.classList.add('with-bottom-snap'));
        
        oldestMessageId = firstMsgId;
      } else {
        // 초기 로드: 전체 교체
        // snap 일시 비활성화 → 렌더링 → 스크롤 → snap 복원
        listEl.classList.remove('with-bottom-snap');
        
        // messages-container 내부만 교체 (snap-trigger 유지)
        const snapTrigger = containerEl.querySelector('.snap-trigger');
        containerEl.innerHTML = renderMessagesWithDates(sortedMessages);
        // snap-trigger 재추가
        const newSnap = document.createElement('div');
        newSnap.className = 'snap-trigger';
        containerEl.appendChild(newSnap);
        
        applyLazyImages();
        oldestMessageId = firstMsgId;
        hasMoreMessages = true;
        
        /* 스크롤을 맨 아래로 — 3단계 보장:
         * telegram-tt는 resetScroll(container, scrollHeight - offsetHeight) 후
         * scroll-snap으로 유지하지만, 우리는 이미지 비동기 로딩이 있어서
         * 추가 보장이 필요함.
         *
         * 1단계: 즉시 (DOM 교체 직후)
         * 2단계: rAF 2프레임 (레이아웃 완료 후) 
         * 3단계: 이미지 로드 완료 후
         */
        // 1단계: 즉시
        listEl.scrollTop = listEl.scrollHeight;
        
        // 2단계: rAF 2프레임 — 첫 프레임에서 레이아웃, 두 번째에서 스크롤
        requestAnimationFrame(() => {
          listEl.scrollTop = listEl.scrollHeight;
          requestAnimationFrame(() => {
            listEl.scrollTop = listEl.scrollHeight;
            // snap 활성화 (스크롤 잡힌 후)
            listEl.classList.add('with-bottom-snap');
          });
        });
        
        // 3단계: 이미지 로드 완료 대기
        const images = listEl.querySelectorAll('img');
        let pending = 0;
        images.forEach(img => {
          if (!img.complete) {
            pending++;
            const onDone = () => {
              if (--pending === 0) {
                listEl.scrollTop = listEl.scrollHeight;
              }
            };
            img.addEventListener('load', onDone, { once: true });
            img.addEventListener('error', onDone, { once: true });
          }
        });
      }
    });

    // v0.8: 새 메시지 수신 — 직접 append + chatUpdate 위임 (round-trip 제거)
    // telegram-tt 참조: src/global/actions/apiUpdaters/messages.ts:463-493 (addChatMessage)
    socket.on('newMessage', (msg) => {
      if (msg && msg._account && msg._account !== activeAccountId) return;
      if (!msg) return;
      const chatId = msg.chat_id;
      const senderId = msg.sender_id?.user_id || msg.sender_id?.chat_id;

      // (v1.3 통합) 입력중 표시 제거 — sender의 typing은 메시지가 오면 종료
      if (chatId && senderId && typingUsers.has(chatId)) {
        const chatTyping = typingUsers.get(chatId);
        if (chatTyping.has(senderId)) {
          clearTimeout(chatTyping.get(senderId).timeout);
          chatTyping.delete(senderId);
          updateTypingStatus(chatId);
        }
      }

      // 활성 채팅이 아니면 cache만 갱신하고 종료 (사이드바는 chatUpdate가 담당)
      if (chatId !== currentChatId) {
        messagesCache[msg.id] = msg;
        return;
      }

      // v1.3.2: 본인 발신 메시지 처리
      //   - 이 웹에서 보낸 경우: messageSendSucceeded 가 먼저 도착해 temp→real 교체 후,
      //     server.js 가 backward-compat 으로 추가 emit 한 newMessage 는 아래 dedup 에서 차단됨.
      //     (socket.io 는 같은 소켓 이벤트 순서를 보장하므로 race 없음)
      //   - PC/모바일 등 다른 클라이언트에서 보낸 경우: DOM 에 없으므로 dedup 통과 → 정상 렌더.
      // dedup: 같은 ID가 이미 DOM에 있으면 스킵
      if (document.querySelector(`[data-msg-id="${msg.id}"]`)) return;

      appendMessageToActiveChat(msg);
      messagesCache[msg.id] = msg;
      maybeAutoScrollToBottom();

      // 활성 채팅에 도착한 메시지는 즉시 읽음 처리 (기존 동작 유지)
      socket.emit('markRead', { chatId, messageIds: [msg.id] });
    });

    // 메시지 전송 성공 (temp ID → real ID 교체)
    // telegram-tt 참조: src/global/actions/apiUpdaters/messages.ts:463-493 (updateMessageSendSucceeded)
    socket.on('messageSendSucceeded', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { oldMessageId, message } = payload || {};
      console.log('[messageSendSucceeded] old:', oldMessageId, 'new:', message.id, 'chat:', message.chat_id);

      if (message.chat_id !== currentChatId) return;

      // 1. DOM에서 temp ID 요소 찾기
      const tempEl = document.querySelector(`[data-msg-id="${oldMessageId}"]`);
      if (!tempEl) {
        console.warn('[messageSendSucceeded] temp element not found:', oldMessageId);
        return;
      }

      // 2. temp ID를 real ID로 교체
      tempEl.setAttribute('data-msg-id', message.id);
      tempEl.setAttribute('oncontextmenu', `showContextMenu(event, ${message.id})`);
      tempEl.setAttribute('ontouchstart', `handleTouchStart(event, ${message.id})`);
      tempEl.setAttribute('onclick', `handleMessageClick(${message.id})`);

      // 3. 캐시 업데이트 (temp 삭제 + real 추가)
      delete messagesCache[oldMessageId];
      messagesCache[message.id] = message;

      // 4. pending 상태 제거 (시각적 표시 업데이트)
      const bubble = tempEl.querySelector('.message-bubble');
      if (bubble) {
        bubble.classList.remove('message-pending');
      }

      console.log('[messageSendSucceeded] 교체 완료:', oldMessageId, '->', message.id);
    });

    // v0.8: 사이드바 last_message 부분 갱신 (server.js updateChatLastMessage → chatUpdate)
    // v0.15: order/is_pinned 동반 → 캐시 갱신 + reorderChatList 로 실시간 재정렬
    socket.on('chatUpdate', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { chatId, lastMessage, order, isPinned, inMain } = payload || {};
      if (!chatId || !lastMessage) return;
      if (chatsCache[chatId]) {
        chatsCache[chatId].last_message = lastMessage;
        if (order !== undefined && order !== null) chatsCache[chatId]._order = order;
        if (isPinned !== undefined) chatsCache[chatId]._isPinned = !!isPinned;
      }
      const chatEl = document.querySelector(`[data-chat-id="${chatId}"]`);
      if (chatEl) {
        updateChatItemLastMessage(chatEl, lastMessage);
      }
      if (inMain !== false) reorderChatList();
    });

    // v0.15: TDLib updateChatPosition → 사이드바 실시간 재정렬
    // (핀 토글, 아카이브, 메시지 외 사유로 위치 변동되는 케이스)
    socket.on('chatPosition', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { chatId, order, isPinned, inMain } = payload || {};
      if (!chatId) return;
      const chat = chatsCache[chatId];
      if (!chat) return;
      chat._order = order || '0';
      chat._isPinned = !!isPinned;
      if (inMain === false) {
        const el = document.querySelector(`[data-chat-id="${chatId}"]`);
        if (el) el.remove();
        return;
      }
      reorderChatList();
    });

    // telegram-tt 참조: src/global/actions/apiUpdaters/chats.ts:162-178
    // updateChatInbox 이벤트 → chat의 unreadCount 즉시 반영 (DOM 직접 업데이트)
    socket.on('chatReadInbox', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { chatId, lastReadInboxMessageId, unreadCount } = payload || {};
      // chatsCache 업데이트
      if (chatsCache[chatId]) {
        chatsCache[chatId]._unreadCount = unreadCount;
        chatsCache[chatId].unread_count = unreadCount;
      }
      // DOM에서 해당 채팅의 배지 직접 업데이트
      const chatEl = document.querySelector(`[data-chat-id="${chatId}"]`);
      if (chatEl) {
        const badgeEl = chatEl.querySelector('.unread-badge');
        if (unreadCount > 0) {
          const badgeText = unreadCount > 99 ? '99+' : String(unreadCount);
          if (badgeEl) {
            badgeEl.textContent = badgeText;
          } else {
            const bottomEl = chatEl.querySelector('.chat-item-bottom');
            if (bottomEl) bottomEl.insertAdjacentHTML('beforeend', `<span class="unread-badge">${badgeText}</span>`);
          }
        } else {
          if (badgeEl) badgeEl.remove();
        }
      }
    });

    // v0.7.1: chatReadOutbox — 상대가 본인 발신 메시지를 읽었을 때 ✓✓ 실시간 전환
    // 셀렉터/비교 방식은 line 2660 chatInfo 핸들러의 기존 패턴과 일치(number 비교, [data-msg-id])
    socket.on('chatReadOutbox', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { chatId, lastReadOutboxMessageId } = payload || {};
      if (chatsCache[chatId]) {
        chatsCache[chatId].last_read_outbox_message_id = lastReadOutboxMessageId;
      }
      if (chatId === currentChatId && lastReadOutboxMessageId) {
        currentChatLastRead = lastReadOutboxMessageId;
        document.querySelectorAll('[data-msg-id]').forEach(el => {
          const msgId = parseInt(el.getAttribute('data-msg-id'));
          const msg = messagesCache[msgId];
          if (msg && msg.is_outgoing) {
            const statusEl = el.querySelector('.read-status');
            if (statusEl) {
              const isRead = msgId <= lastReadOutboxMessageId;
              if (isRead && !statusEl.classList.contains('read')) {
                statusEl.classList.add('read');
                statusEl.textContent = '✓✓';
              }
            }
          }
        });
      }
    });

    function hideAllForms() {
      document.getElementById('phoneForm').classList.add('hidden');
      document.getElementById('codeForm').classList.add('hidden');
      document.getElementById('passwordForm').classList.add('hidden');
      document.getElementById('waitingState').classList.add('hidden');

      document.getElementById('mainScreen').classList.remove('hidden');

    function openChat(chatId, title) {
      const input = document.getElementById('messageInput');

      // v1.2: 이전 채팅의 입력 내용 저장 (telegram-tt saveDraft 패턴)
      // 참조: src/global/actions/api/messages.ts:726-751
      // 레이스 컨디션 방지: draftSaveTimer 즉시 취소 후 동기적으로 저장
      clearTimeout(draftSaveTimer);
      if (currentChatId) {
        const prevChatId = currentChatId; // 명시적으로 이전 chatId 캡처
        const draftText = input.value.trim();
        if (draftText) {
          draftMessages[prevChatId] = draftText;
        } else {
          delete draftMessages[prevChatId];
        }
      }

      currentChatId = chatId;
      currentChatLastRead = null;  // 읽음 상태 초기화
      localStorage.setItem(LAST_CHAT_KEY, String(chatId));

      // v1.0: 채팅 상태 표시 (온라인/멤버수) + 입력 중 복원용 저장
      const chatInfo = chatsCache[chatId];

      // v0.13: 저장된 메시지 등 표시용 제목/아바타 우선 적용
      const headerTitle = (chatInfo && chatInfo._displayTitle) || title;
      document.getElementById('chatTitle').textContent = headerTitle;

      // v0.13: 헤더 아바타 — 저장된 메시지는 전용 아이콘, 그 외 프로필 사진/이니셜
      const headerAvatarEl = document.getElementById('chatHeaderAvatar');
      headerAvatarEl.removeAttribute('style');
      headerAvatarEl.innerHTML = '';
      headerAvatarEl.textContent = '';
      if (chatInfo && chatInfo._isSavedMessages) {
        headerAvatarEl.className = 'chat-header-avatar saved-messages';
        headerAvatarEl.style.display = 'flex';
      } else if (chatInfo && chatInfo._avatarData) {
        headerAvatarEl.className = 'chat-header-avatar';
        headerAvatarEl.style.display = 'block';
        headerAvatarEl.innerHTML = `<img src="${chatInfo._avatarData}" class="chat-header-avatar">`;
      } else {
        const avatarColors = ['#c03d33','#4fad2d','#d09306','#168acd','#8544d6','#cd4073','#2996ad','#ce671b'];
        const bg = avatarColors[Math.abs(chatId) % avatarColors.length];
        const ini = Array.from(headerTitle || '?')[0] || '?';
        headerAvatarEl.className = 'chat-header-avatar';
        headerAvatarEl.style.display = 'flex';
        headerAvatarEl.style.background = bg;
        headerAvatarEl.textContent = ini;
      }

      document.getElementById('inputArea').classList.remove('hidden');
      document.getElementById('searchToggleBtn').style.display = 'block';
      closeChatSearch(); // 이전 검색 닫기

      const statusEl = document.getElementById('chatStatus');
      if (chatInfo?._statusText) {
        statusEl.textContent = chatInfo._statusText;
        const statusColor = chatInfo._isOnline ? '#4caf50' : '#707579';
        statusEl.style.color = statusColor;
        savedChatStatus[chatId] = { text: chatInfo._statusText, color: statusColor };
      } else {
        statusEl.textContent = '';
        savedChatStatus[chatId] = { text: '', color: '' };
      }

      // v1.2: 채팅 전환 시 reply 상태 + replyStack 초기화
      clearReply();
      replyStack = [];
      removeScrollToBottomBtn();
      
      // v1.2: 새 채팅의 draft 복원 (telegram-tt 패턴)
      input.value = draftMessages[chatId] || '';
      input.style.height = 'auto';

      // 메시지 목록 초기화 (로딩 중 표시)
      document.getElementById('messageList').innerHTML = '<div class="messages-container space-y-2"><div class="text-center text-gray-400">로딩 중...</div><div class="snap-trigger"></div></div>';

      // 선택 표시
      document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
      const activeEl = document.querySelector(`[data-chat-id="${chatId}"]`);
      if (activeEl) activeEl.classList.add('active');

      // 모바일: 채팅 목록 숨기기
      if (window.innerWidth <= 768) {
        document.getElementById('chatListPanel').classList.add('hidden-mobile');
      }

      socket.emit('getMessages', { chatId });

      // 입력창에 포커스
      setTimeout(() => input.focus(), 100);
      
      // 인피니티 스크롤 이벤트 (위로 스크롤 시 이전 메시지 로드) + 스크롤 다운 버튼
      const listEl = document.getElementById('messageList');
      const scrollDownBtn = document.getElementById('scrollDownBtn');
      const floatingDate = document.getElementById('floatingDate');
      let floatingDateTimeout = null;
      
      listEl.onscroll = function() {
        // 이전 메시지 로드
        if (listEl.scrollTop < 100 && !isLoadingMore && hasMoreMessages && oldestMessageId) {
          isLoadingMore = true;
          console.log('Loading more messages from:', oldestMessageId);
          socket.emit('getMessages', { chatId: currentChatId, fromMessageId: oldestMessageId, isHistory: true });
        }
        // 스크롤 다운 버튼 표시/숨기기 (바닥에서 200px 이상 위에 있으면 표시)
        const isNearBottom = listEl.scrollHeight - listEl.scrollTop - listEl.clientHeight < 200;
        scrollDownBtn.style.display = isNearBottom ? 'none' : 'flex';
        
        // v0.7: 플로팅 날짜 표시
        const dateSeps = listEl.querySelectorAll('.date-separator');
        let currentDate = null;
        for (const sep of dateSeps) {
          const rect = sep.getBoundingClientRect();
          const listRect = listEl.getBoundingClientRect();
          if (rect.top < listRect.top + 50) {
            currentDate = sep.querySelector('.date-separator-badge').textContent;
          }
        }
        if (currentDate && !isNearBottom) {
          floatingDate.textContent = currentDate;
          floatingDate.classList.add('visible');
          clearTimeout(floatingDateTimeout);
          floatingDateTimeout = setTimeout(() => {
            floatingDate.classList.remove('visible');
          }, 1500);
        } else {
          floatingDate.classList.remove('visible');
        }
      };
    }
    
    // 최신 메시지로 스크롤
    function scrollToBottom() {
      const listEl = document.getElementById('messageList');
      listEl.scrollTop = listEl.scrollHeight;
    }
    
    function showChatList() {
      document.getElementById('chatListPanel').classList.remove('hidden-mobile');
    }
    
    // 스와이프 제스처 (오른쪽으로 스와이프 → 채팅 목록)
    let touchStartX = 0;
    let touchEndX = 0;
    
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    
    document.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, { passive: true });
    
    function handleSwipe() {
      const swipeDistance = touchEndX - touchStartX;
      // 오른쪽으로 100px 이상 스와이프하면 채팅 목록 표시
      if (swipeDistance > 100 && window.innerWidth <= 768) {
        showChatList();
      }
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
      // Shift+Enter는 기본 동작(줄바꿈) 유지
      
      // v0.5: 위쪽 화살표 - 마지막 내 메시지 편집
      if (event.key === 'ArrowUp' && event.target.value === '') {
        event.preventDefault();
        editLastMessage();
      }
      
      // textarea 높이 자동 조절
      const textarea = event.target;
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
    }
    
    // v0.5: 마지막 내 메시지 편집
    function editLastMessage() {
      // messagesCache에서 가장 최근 내 메시지 찾기
      const myMessages = Object.values(messagesCache)
        .filter(m => m.is_outgoing && m.content?.text?.text)
        .sort((a, b) => b.date - a.date);
      
      if (myMessages.length > 0) {
        selectedMessage = myMessages[0];
        editMessage();
      }
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp * 1000);
      const hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const ampm = hours < 12 ? '오전' : '오후';
      const hour12 = hours % 12 || 12;
      return `${ampm} ${hour12}:${minutes}`;
    }
    
    // v0.7: 날짜 포맷 (M월 D일)
    function formatDate(timestamp) {
      const date = new Date(timestamp * 1000);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${month}월 ${day}일`;
    }
    
    // v0.7: 날짜가 다른지 확인
    function isDifferentDay(ts1, ts2) {
      const d1 = new Date(ts1 * 1000);
      const d2 = new Date(ts2 * 1000);
      return d1.toDateString() !== d2.toDateString();
    }
    
    // v0.7: 날짜 구분선 HTML
    function renderDateSeparator(timestamp) {
      return `<div class="date-separator" data-date="${timestamp}"><span class="date-separator-badge">${formatDate(timestamp)}</span></div>`;
    }
    
    // 엔티티 내부용: trim/URL링크 없이 순수 HTML 이스케이프만
    function escapeHtmlRaw(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const trimmed = text
        .replace(/^[\s\n\r]+/, '')
        .replace(/[\s\n\r]+$/, '')
        .replace(/\n{3,}/g, '\n\n');
      
      const escaped = escapeHtmlRaw(trimmed);
      
      return escaped.replace(
        /(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" class="msg-link">$1</a>'
      ).replace(/\n/g, '<br>');
    }
    
    // v1.0: TDLib entities를 HTML로 렌더링 (공식 텔레그램 스타일)
    function renderFormattedText(formattedText) {
      if (!formattedText) return '';
      const text = formattedText.text || '';
      const entities = formattedText.entities || [];
      
      if (entities.length === 0) return escapeHtml(text);
      
      // 엔티티가 있을 때는 전체 텍스트 trim을 먼저 하되, 내부 줄바꿈은 보존
      const trimmedText = text.replace(/^[\s\n\r]+/, '').replace(/[\s\n\r]+$/, '');
      const trimOffset = text.length - text.replace(/^[\s\n\r]+/, '').length; // 앞에서 잘린 길이
      
      // 엔티티를 offset 기준 정렬
      const sorted = [...entities].sort((a, b) => a.offset - b.offset);
      
      let result = '';
      let pos = 0;
      
      for (const ent of sorted) {
        // trimOffset 반영: 앞이 잘린 만큼 엔티티 offset 보정
        const start = Math.max(0, ent.offset - trimOffset);
        const end = Math.max(0, ent.offset + ent.length - trimOffset);
        const type = ent.type?._;
        
        if (end <= 0 || start >= trimmedText.length) continue; // trim으로 잘린 영역
        
        const clampedStart = Math.min(start, trimmedText.length);
        const clampedEnd = Math.min(end, trimmedText.length);
        
        // 엔티티 이전 텍스트 (escapeHtmlRaw: trim 없이 순수 이스케이프만)
        if (clampedStart > pos) {
          result += escapeHtmlRaw(trimmedText.substring(pos, clampedStart));
        }
        
        const entityText = trimmedText.substring(clampedStart, clampedEnd);
        const escapedText = escapeHtmlRaw(entityText);
        
        switch (type) {
          case 'textEntityTypeBold':
            result += `<b>${escapedText}</b>`;
            break;
          case 'textEntityTypeItalic':
            result += `<i>${escapedText}</i>`;
            break;
          case 'textEntityTypeUnderline':
            result += `<u>${escapedText}</u>`;
            break;
          case 'textEntityTypeStrikethrough':
            result += `<s>${escapedText}</s>`;
            break;
          case 'textEntityTypeCode':
            result += `<code class="msg-code">${escapedText}</code>`;
            break;
          case 'textEntityTypePre':
            result += `<pre class="msg-pre">${escapedText}</pre>`;
            break;
          case 'textEntityTypePreCode':
            const lang = ent.type?.language || '';
            result += `<pre class="msg-pre"><code${lang ? ` data-lang="${lang}"` : ''}>${escapedText}</code></pre>`;
            break;
          case 'textEntityTypeUrl':
            result += `<a href="${entityText}" target="_blank" class="msg-link">${escapedText}</a>`;
            break;
          case 'textEntityTypeTextUrl':
            const url = ent.type?.url || entityText;
            result += `<a href="${url}" target="_blank" class="msg-link">${escapedText}</a>`;
            break;
          case 'textEntityTypeMention':
            result += `<span class="msg-mention">${escapedText}</span>`;
            break;
          case 'textEntityTypeMentionName':
            result += `<span class="msg-mention">${escapedText}</span>`;
            break;
          case 'textEntityTypeHashtag':
            result += `<span class="msg-hashtag" onclick="openChatSearchWith('${entityText.replace(/'/g, "\\'")}')">${escapedText}</span>`;
            break;
          case 'textEntityTypeBotCommand':
            result += `<span class="msg-bot-command">${escapedText}</span>`;
            break;
          case 'textEntityTypeSpoiler':
            result += `<span class="msg-spoiler" onclick="this.classList.toggle('revealed')">${escapedText}</span>`;
            break;
          default:
            result += escapedText;
        }
        
        pos = clampedEnd;
      }
      
      // 나머지 텍스트
      if (pos < trimmedText.length) {
        result += escapeHtmlRaw(trimmedText.substring(pos));
      }
      
      // 연속 3줄 이상 줄바꿈은 2줄로 정리
      result = result.replace(/\n{3,}/g, '\n\n');
      
      // pre/code 블록 밖의 줄바꿈만 <br>로 변환
      // pre 블록 안에서는 \n 유지 (white-space: pre가 처리)
      result = result.replace(/\n/g, '<br>');
      return result;
    }

    // 이미지 압축 (회사 프록시 크기 제한 우회)
    function compressImage(dataUrl, maxWidth = 1280, quality = 0.7) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxWidth) {
            h = Math.round(h * maxWidth / w);
            w = maxWidth;
          }
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = dataUrl;
      });
    }

    // 클립보드 붙여넣기 처리
    function handlePaste(event) {
      const items = event.clipboardData?.items;
      if (!items) return;

      for (const item of items) {
        if (item.type.startsWith('image/')) {
          event.preventDefault();
          const file = item.getAsFile();
          if (file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
              // 이미지 압축 (프록시 크기 제한 대응)
              const compressed = await compressImage(e.target.result);
              pendingImage = compressed;
              document.getElementById('previewImg').src = pendingImage;
              document.getElementById('imagePreview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
          }
          break;
        }
      }
    }

    // 이미지 미리보기 취소
    function clearImage() {
      pendingImage = null;
      document.getElementById('imagePreview').classList.add('hidden');
      document.getElementById('previewImg').src = '';
    }

    // 메시지 전송 (이미지/파일 포함)
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();

      if (!currentChatId) return;

      // v0.4: 파일이 있으면 파일 전송
      if (pendingFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
          // Optimistic: 파일 메시지 즉시 표시
          const tempId = `temp_${Date.now()}`;
          const optimisticMsg = {
            id: tempId,
            chat_id: currentChatId,
            is_outgoing: true,
            date: Math.floor(Date.now() / 1000),
            content: {
              _: 'messageDocument',
              document: { file_name: pendingFile.name, document: { size: pendingFile.size } },
              caption: text ? { text } : null
            },
            _isPending: true
          };
          appendOptimisticMessage(optimisticMsg);

          socket.emit('sendFile', {
            chatId: currentChatId,
            fileData: e.target.result,
            fileName: pendingFile.name,
            mimeType: pendingFile.type,
            caption: text,
            replyToMessageId: replyingTo?.id,
            tempId
          });
          clearFile();
          clearReply();
          input.value = '';
          input.style.height = 'auto';
          delete draftMessages[currentChatId]; // v1.2: draft 삭제
        };
        reader.readAsDataURL(pendingFile);
        return;
      }

      // 이미지가 있으면 이미지 전송
      if (pendingImage) {
        // Optimistic: 이미지 메시지 즉시 표시
        const tempId = `temp_${Date.now()}`;
        const optimisticMsg = {
          id: tempId,
          chat_id: currentChatId,
          is_outgoing: true,
          date: Math.floor(Date.now() / 1000),
          content: {
            _: 'messagePhoto',
            photo: {},
            caption: text ? { text } : null
          },
          _imageData: pendingImage,
          _isPending: true
        };
        if (replyingTo) {
          optimisticMsg.reply_to = { message_id: replyingTo.id };
          optimisticMsg._replyTo = replyingTo._replyTo || {
            id: replyingTo.id,
            senderName: replyingTo._senderName || '상대방',
            text: replyingTo.content?.text?.text || '[미디어]',
            isOutgoing: replyingTo.is_outgoing
          };
        }
        appendOptimisticMessage(optimisticMsg);

        socket.emit('sendImage', { chatId: currentChatId, imageData: pendingImage, caption: text, replyToMessageId: replyingTo?.id, tempId });
        clearImage();
        clearReply();
        input.value = '';
        input.style.height = 'auto';
        delete draftMessages[currentChatId]; // v1.2: draft 삭제
        return;
      }

      // v0.5: 전달 모드
      if (pendingForward) {
        socket.emit('forwardMessage', {
          fromChatId: pendingForward.fromChatId,
          messageId: pendingForward.messageId,
          toChatId: currentChatId
        });
        // 추가 메시지가 있으면 전송
        if (text) {
          setTimeout(() => {
            socket.emit('sendMessage', { chatId: currentChatId, text });
          }, 100);
        }
        cancelForward();
        input.value = '';
        input.style.height = 'auto';
        delete draftMessages[currentChatId]; // v1.2: draft 삭제
        return;
      }

      // v0.5: 편집 모드
      if (editingMessage && text) {
        socket.emit('editMessageText', {
          chatId: currentChatId,
          messageId: editingMessage.id,
          text: text
        });
        cancelEdit();
        input.value = '';
        input.style.height = 'auto';
        delete draftMessages[currentChatId]; // v1.2: draft 삭제
        return;
      }

      // 텍스트만 있으면 텍스트 전송 + Optimistic Rendering
      // telegram-tt 참조: src/global/actions/api/messages.ts (sendMessage action)
      if (text) {
        // 1. Optimistic 메시지 생성 (temp ID 사용)
        const tempId = `temp_${Date.now()}`;
        const optimisticMsg = {
          id: tempId,
          chat_id: currentChatId,
          is_outgoing: true,
          date: Math.floor(Date.now() / 1000),
          content: {
            _: 'messageText',
            text: { text }
          },
          _isPending: true  // 전송 중 표시
        };

        // 답장 정보 포함
        if (replyingTo) {
          optimisticMsg.reply_to = { message_id: replyingTo.id };
          optimisticMsg._replyTo = replyingTo._replyTo || {
            id: replyingTo.id,
            senderName: replyingTo._senderName || '상대방',
            text: replyingTo.content?.text?.text || '[미디어]',
            isOutgoing: replyingTo.is_outgoing
          };
        }

        // 2. 즉시 DOM에 추가
        appendOptimisticMessage(optimisticMsg);

        // 3. 서버에 전송 (tempId 포함 — 서버가 나중에 매핑용)
        socket.emit('sendMessage', { chatId: currentChatId, text, replyToMessageId: replyingTo?.id, tempId });
        clearReply();
        input.value = '';
        input.style.height = 'auto';

        // v1.2: 메시지 전송 후 draft 삭제 (telegram-tt clearDraft 패턴)
        // 참조: src/global/actions/api/messages.ts:753-773
        delete draftMessages[currentChatId];
      }
    }

    // Optimistic 메시지 DOM 추가 함수
    // telegram-tt 참조: src/global/actions/apiUpdaters/messages.ts (updateMessageSendSucceeded)
    function appendOptimisticMessage(msg) {
      console.log('[optimistic] 추가 시작:', msg.id, 'text:', msg.content?.text?.text?.substring(0, 30));
      const listEl = document.getElementById('messageList');
      const container = listEl.querySelector('.messages-container');
      if (!container) { console.warn('[optimistic] container 없음!'); return; }

      // 캐시에 저장
      messagesCache[msg.id] = msg;

      // 날짜 구분선 체크 (마지막 메시지와 날짜 비교)
      // ⚠️ snap-trigger 가 messages-container 의 마지막 div 이므로
      //    `[data-msg-id]:last-of-type` 셀렉터는 항상 null 을 반환한다.
      //    appendMessageToActiveChat 과 동일하게 querySelectorAll 로 처리.
      const existingMsgEls = container.querySelectorAll('[data-msg-id]');
      let needDateSeparator = true;
      if (existingMsgEls.length > 0) {
        const lastMsgEl = existingMsgEls[existingMsgEls.length - 1];
        const lastMsgId = lastMsgEl.getAttribute('data-msg-id');
        const lastMsg = messagesCache[lastMsgId];
        if (lastMsg && formatDate(lastMsg.date) === formatDate(msg.date)) {
          needDateSeparator = false;
        }
      }

      if (needDateSeparator) {
        container.insertAdjacentHTML('beforeend', renderDateSeparator(msg.date));
      }

      // 메시지 렌더링
      const msgHtml = renderMessage(msg);
      const snapTrigger = container.querySelector('.snap-trigger');
      if (snapTrigger) {
        snapTrigger.insertAdjacentHTML('beforebegin', msgHtml);
      } else {
        container.insertAdjacentHTML('beforeend', msgHtml);
      }

      // 스크롤 맨 아래로 (3단계 보장 — 초기 로드와 동일 패턴)
      listEl.scrollTop = listEl.scrollHeight;
      requestAnimationFrame(() => {
        listEl.scrollTop = listEl.scrollHeight;
        requestAnimationFrame(() => {
          listEl.scrollTop = listEl.scrollHeight;
        });
      });
    }
    
    // ========== v1.0: 컨텍스트 메뉴 (모바일 롱탭 개선) ==========
    let touchTimer = null;
    let touchStartPos = null;
    let touchMoved = false;
    
    function showContextMenu(e, msgId) {
      e.preventDefault();
      e.stopPropagation();
      selectedMessage = messagesCache[msgId];
      if (!selectedMessage) return;
      
      // 내 메시지일 때만 편집 버튼 표시
      const editItem = document.getElementById('editMenuItem');
      editItem.style.display = selectedMessage.is_outgoing ? 'block' : 'none';
      
      const menu = document.getElementById('contextMenu');
      const x = e.clientX || e.pageX || 0;
      const y = e.clientY || e.pageY || 0;
      menu.style.display = 'block';
      menu.style.left = Math.min(x, window.innerWidth - 190) + 'px';
      menu.style.top = Math.min(y, window.innerHeight - 200) + 'px';
      
      // 모바일에서 햅틱 피드백 (지원하는 경우)
      if (navigator.vibrate) navigator.vibrate(30);
    }
    
    function handleTouchStart(e, msgId) {
      touchMoved = false;
      touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      
      touchTimer = setTimeout(() => {
        if (!touchMoved) {
          // 브라우저 기본 동작 방지
          e.preventDefault();
          const touch = e.touches[0] || touchStartPos;
          showContextMenu({
            preventDefault: () => {},
            stopPropagation: () => {},
            clientX: touch.clientX || touchStartPos.x,
            clientY: touch.clientY || touchStartPos.y
          }, msgId);
        }
      }, 400);  // 400ms (공식 텔레그램과 유사)
    }
    
    function handleTouchMove(e) {
      if (!touchStartPos) return;
      const dx = Math.abs(e.touches[0].clientX - touchStartPos.x);
      const dy = Math.abs(e.touches[0].clientY - touchStartPos.y);
      // 10px 이상 이동하면 롱탭 취소 (스크롤 중)
      if (dx > 10 || dy > 10) {
        touchMoved = true;
        if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
      }
    }
    
    function handleTouchEnd(e) {
      if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
      touchStartPos = null;
    }
    
    function hideContextMenu() {
      document.getElementById('contextMenu').style.display = 'none';
      selectedMessage = null;
    }
    
    // ========== v0.5: 전달 ==========
    let forwardingMessage = null;
    
    function forwardMessage() {
      if (!selectedMessage) return;
      forwardingMessage = selectedMessage;
      hideContextMenu();
      
      // 전달 모달 열기
      const modal = document.getElementById('forwardModal');
      modal.style.display = 'flex';
      
      // 채팅 목록 로드
      loadForwardChatList();
    }
    
    function loadForwardChatList() {
      const listEl = document.getElementById('forwardChatList');
      listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #8b9ba5;">로딩 중...</div>';

      // v0.14: DOM 의존 제거. chatsCache 에서 직접 빌드 (최근 활동 순, 자기 자신 제외)
      const entries = Object.values(chatsCache || {})
        .filter(c => c && String(c.id) !== String(currentChatId))
        .sort((a, b) => {
          const ta = a.last_message?.date || a.last_message_date || 0;
          const tb = b.last_message?.date || b.last_message_date || 0;
          return tb - ta;
        });

      if (entries.length === 0) {
        listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #8b9ba5;">전달할 채팅이 없습니다</div>';
        return;
      }

      const html = entries.map(chat => {
        const displayTitle = chat._displayTitle || chat.title || '채팅';
        const initial = (Array.from(displayTitle)[0] || '?').toUpperCase();
        return `<div class="forward-chat-item" onclick="doForward(${chat.id})">
          <div class="forward-chat-avatar">${escapeHtml(initial)}</div>
          <div class="forward-chat-name">${escapeHtml(displayTitle)}</div>
        </div>`;
      }).join('');

      listEl.innerHTML = html;
    }
    
    function doForward(toChatId) {
      if (!forwardingMessage) return;
      
      const msgToForward = forwardingMessage;
      const fromChat = currentChatId;
      closeForwardModal();
      
      // 해당 채팅으로 이동
      const chatItem = document.querySelector(`[data-chat-id="${toChatId}"]`);
      const chatName = chatItem?.querySelector('.font-medium')?.textContent || '채팅';
      openChat(toChatId, chatName);
      
      // 전달 미리보기 표시 (답장처럼)
      pendingForward = {
        fromChatId: fromChat,
        messageId: msgToForward.id,
        text: msgToForward.content?.text?.text || '[미디어]'
      };
      
      // 전달 표시 UI
      showForwardPreview();
    }
    
    let pendingForward = null;
    
    function showForwardPreview() {
      if (!pendingForward) return;
      
      const inputArea = document.getElementById('inputArea');
      let indicator = document.getElementById('forwardIndicator');
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.id = 'forwardIndicator';
        indicator.className = 'edit-indicator';
        inputArea.insertBefore(indicator, inputArea.firstChild);
      }
      
      const previewText = pendingForward.text.length > 50 
        ? pendingForward.text.substring(0, 50) + '...' 
        : pendingForward.text;
      
      indicator.innerHTML = `
        <span class="edit-indicator-text">↪️ 전달: ${escapeHtml(previewText)}</span>
        <button class="edit-indicator-close" onclick="cancelForward()">✕</button>
      `;
      indicator.style.display = 'flex';
      
      document.getElementById('messageInput').focus();
    }
    
    function cancelForward() {
      pendingForward = null;
      const indicator = document.getElementById('forwardIndicator');
      if (indicator) indicator.style.display = 'none';
    }
    
    function closeForwardModal() {
      document.getElementById('forwardModal').style.display = 'none';
      forwardingMessage = null;
    }
    
    // ========== v0.5: 편집 ==========
    let editingMessage = null;
    
    function editMessage() {
      if (!selectedMessage) return;

    // 네이티브 포맷으로 복사
    function copySelectedMessages() {
      if (selectedMessages.size === 0) return;

      // 선택된 메시지를 시간순으로 정렬
      const messages = Array.from(selectedMessages)
        .map(id => messagesCache[id])
        .filter(msg => msg)
        .sort((a, b) => a.date - b.date);

      // 네이티브 텔레그램 포맷으로 변환
      const lines = messages.map(msg => {
        const date = new Date(msg.date * 1000);
        const dateStr = formatDateForCopy(date);
        const senderName = msg._senderName || (msg.is_outgoing ? '나' : '상대방');
        const text = msg.content?.text?.text || msg.content?.caption?.text || '[미디어]';

        // 여러 줄 메시지는 줄바꿈 유지
        const formattedText = text.split('\n').map((line, idx) => {
          if (idx === 0) {
            return `[${dateStr}] ${senderName}: ${line}`;
          } else {
            return line;
          }
        }).join('\n');

        return formattedText;
      });

      const textToCopy = lines.join('\n');

      navigator.clipboard.writeText(textToCopy).then(() => {
        console.log('메시지 복사됨:', selectedMessages.size, '개');
        exitSelectMode();
      }).catch(err => {
        console.error('복사 실패:', err);
      });
    }

    // 날짜 포맷팅: [2026-04-10 오후 8:17]
    function formatDateForCopy(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');

      let hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, '0');

      // 12시간 포맷 변환
      const isPM = hours >= 12;
      const period = isPM ? '오후' : '오전';
      hours = hours % 12 || 12; // 0시 -> 12시

      return `${year}-${month}-${day} ${period} ${hours}:${minutes}`;
    }

      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    socket.on('messagesDeleted', (payload) => {

        document.querySelectorAll('[data-msg-id]').forEach(el => {

          const msg = messagesCache[msgId];
          if (msg && msg.is_outgoing) {
