    // v1.3: 상대방 입력 중 표시 — telegram-tt 기반 완전 재구현
    // telegram-tt 참조:
    //   buildChatTypingStatus (apiBuilders/chats.ts:388-452):
    //     - SendMessageCancelAction → return undefined (즉시 제거)
    //     - SendMessageTypingAction → return { action, timestamp }
    //   updateChatTypingStatus (apiUpdaters/chats.ts:180-192):
    //     - typingStatus를 저장하고 6초 후 timestamp 비교해서 제거
    //     - 새 typing 이벤트가 오면 timestamp 갱신 → 이전 타이머는 무효화
    const typingUsers = new Map(); // chatId -> Map(userId -> {name, timeout, timestamp})
    let savedChatStatus = {}; // chatId -> 원래 상태 텍스트 저장
    
    // telegram-tt: TYPING_STATUS_CLEAR_DELAY = 6000ms
    // src/global/actions/apiUpdaters/chats.ts:47
    const TYPING_STATUS_CLEAR_DELAY = 6000;
    
    socket.on('chatAction', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { chatId, senderId, action, userName } = payload || {};
      console.log('[chatAction]', chatId, action?._, userName, 'currentChat:', currentChatId);
      const userId = senderId?.user_id || senderId?.chat_id;
      if (!userId) return;
      
      if (!typingUsers.has(chatId)) {
        typingUsers.set(chatId, new Map());
      }
      const chatTyping = typingUsers.get(chatId);

      // Cancel 이벤트: 즉시 제거하지 않고 6초 타이머에 의존
      // TDLib은 typing→cancel을 빠르게 반복 전송하는 경우가 있어서
      // 즉시 제거하면 "입력 중"이 깜빡이고 사라짐
      // 실제 메시지 전송 시에는 newMessage 이벤트에서 제거됨
      if (!action || action._ === 'chatActionCancel') {
        return;
      }

      // typing 계열 액션 (chatActionTyping, chatActionUploadingPhoto 등)
      const displayName = userName || '상대방';
      const timestamp = Date.now();
      
      // 기존 타이머 취소
      if (chatTyping.has(userId)) {
        clearTimeout(chatTyping.get(userId).timeout);
      }
      
      // telegram-tt 패턴: timestamp 저장 → 6초 후 timestamp 비교해서 제거
      // 그 사이에 새 typing 이벤트가 오면 timestamp가 갱신되어 이전 타이머는 무효
      const timeout = setTimeout(() => {
        const entry = chatTyping.get(userId);
        if (entry && entry.timestamp === timestamp) {
          chatTyping.delete(userId);
          updateTypingStatus(chatId);
        }
      }, TYPING_STATUS_CLEAR_DELAY);
      
      chatTyping.set(userId, { name: displayName, timeout, timestamp });
      updateTypingStatus(chatId);
    });
    
    // v1.3 typing 제거: v0.8에서 통합 newMessage 핸들러(상단)에 흡수됨

    function updateTypingStatus(chatId) {
      const chatTyping = typingUsers.get(chatId);
      const isTyping = chatTyping && chatTyping.size > 0;
      console.log('[updateTypingStatus]', chatId, 'isTyping:', isTyping, 'typingCount:', chatTyping?.size || 0);
      
      // 1) 채팅 목록의 typing 표시 (telegram-tt: Chat.tsx에서 typing 시 lastMessage 대신 표시)
      const chatEl = document.querySelector(`[data-chat-id="${chatId}"]`);
      console.log('[updateTypingStatus] chatEl found:', !!chatEl, 'selector:', `[data-chat-id="${chatId}"]`);
      if (chatEl) {
        const msgEl = chatEl.querySelector('.chat-item-msg');
        console.log('[updateTypingStatus] msgEl found:', !!msgEl);
        if (msgEl) {
          if (isTyping) {
            // 원본 텍스트 저장 (아직 안 했으면)
            if (!msgEl.dataset.originalText) {
              msgEl.dataset.originalText = msgEl.textContent;
            }
            const names = Array.from(chatTyping.values()).map(u => u.name);
            let typingLabel = names.length === 1 ? `${names[0]} 입력 중` : `${names[0]} 외 ${names.length - 1}명 입력 중`;
            msgEl.innerHTML = `<span class="DotAnimation" style="color:#3390ec">${typingLabel}<span class="ellipsis"></span></span>`;
          } else {
            // 원본 복원
            if (msgEl.dataset.originalText) {
              msgEl.textContent = msgEl.dataset.originalText;
              delete msgEl.dataset.originalText;
            }
          }
        }
      }
      
      // 2) 현재 열린 채팅의 헤더 typing 표시
      if (chatId != currentChatId) return;

      const chatStatus = document.getElementById('chatStatus');

      if (!isTyping) {
        // 원래 상태로 복원
        const saved = savedChatStatus[chatId];
        if (saved) {
          chatStatus.textContent = saved.text;
          chatStatus.style.color = saved.color;
        } else {
          chatStatus.textContent = '';
          chatStatus.style.color = '';
        }
        return;
      }

      const names = Array.from(chatTyping.values()).map(u => u.name);
      chatStatus.style.color = '#3390ec';

      // v1.2: DotAnimation 포팅 (telegram-tt 스타일)
      // 참조: telegram-tt TypingStatus.tsx:25-40
      let typingText = '';
      if (currentChatType === 'private') {
        typingText = '입력 중';
      } else {
        if (names.length === 1) {
          typingText = `${names[0]} 입력 중`;
        } else if (names.length === 2) {
          typingText = `${names[0]}, ${names[1]} 입력 중`;
        } else {
          typingText = `${names[0]} 외 ${names.length - 1}명 입력 중`;
        }
      }

      // DotAnimation HTML 생성
      chatStatus.innerHTML = `<span class="DotAnimation">${typingText}<span class="ellipsis"></span></span>`;
    }
    
    // ========== v1.1: focusMessage 시스템 (telegram-tt 포팅) ==========
    // 참조: telegram-tt src/global/actions/ui/messages.ts:360-472
    // replyStack: src/global/actions/ui/messages.ts:333-357
    // handleReplyClick: src/components/middle/message/hooks/useInnerHandlers.ts:99-123
    // FOCUS_DURATION: 1500ms (messages.ts:74)
    
    const FOCUS_DURATION = 1500;
    let replyStack = []; // telegram-tt replyStack — 뒤로가기 지원
    let pendingScrollTarget = null;
    let focusTimeout = null;
    
    function scrollToMessage(msgId, fromMessageId) {
      // telegram-tt: handleReplyClick → focusMessage({messageId, replyMessageId})
      // replyMessageId = 현재 위치 기록 (뒤로가기용)
      if (fromMessageId) {
        replyStack.push(fromMessageId);
      }
      
      const msgEl = document.querySelector(`[data-msg-id="${msgId}"]`);
      if (msgEl) {
        // telegram-tt: viewportIds에 있으면 바로 스크롤
        focusMessageElement(msgEl);
      } else {
        // telegram-tt: viewportIds에 없으면 loadViewportMessages 호출
        console.log('Message not in viewport, loading around:', msgId);
        pendingScrollTarget = msgId;
        socket.emit('getMessagesAround', { chatId: currentChatId, messageId: msgId, limit: 30 });
      }
      
      // 뒤로가기 버튼 표시
      updateScrollToBottomBtn();
    }
    
    function focusMessageElement(msgEl) {
      // telegram-tt: Message.scss:597 — .focused 클래스 토글
      // FOCUS_DURATION(1500ms) 후 제거
      msgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      if (focusTimeout) clearTimeout(focusTimeout);
      
      // 이전 focused 제거
      document.querySelectorAll('.message-focused').forEach(el => el.classList.remove('message-focused'));
      
      // focused 클래스 추가
      const bubble = msgEl.querySelector('.message-bubble') || msgEl;
      bubble.classList.add('message-focused');
      
      focusTimeout = setTimeout(() => {
        bubble.classList.remove('message-focused');
        focusTimeout = null;
      }, FOCUS_DURATION);
    }
    
    // telegram-tt: focusLastMessage (replyStack.pop)
    function focusLastMessage() {
      if (replyStack.length === 0) {
        // telegram-tt: stack 비면 scrollMessageListToBottom
        removeScrollToBottomBtn();
        socket.emit('getMessages', { chatId: currentChatId, limit: 30 });
        return;
      }
      const messageId = replyStack.pop();
      const msgEl = document.querySelector(`[data-msg-id="${messageId}"]`);
      if (msgEl) {
        focusMessageElement(msgEl);
      } else {
        pendingScrollTarget = messageId;
        socket.emit('getMessagesAround', { chatId: currentChatId, messageId, limit: 30 });
      }
      updateScrollToBottomBtn();
    }
    
    // messagesAround 이벤트 — telegram-tt의 loadViewportMessages 대응
    socket.on('messagesAround', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { chatId, messages: msgs, targetMessageId, chatType, error } = payload || {};
      if (error) {
        console.error('messagesAround error:', error);
        pendingScrollTarget = null;
        return;
      }
      if (!msgs || msgs.length === 0 || chatId !== currentChatId) {
        pendingScrollTarget = null;
        return;
      }
      
      const container = document.getElementById('messages');
      container.innerHTML = '';
      
      msgs.forEach(msg => {
        messagesCache[msg.id] = msg;
        appendMessage(msg, false, chatType);
      });
      
      setTimeout(() => {
        const targetEl = document.querySelector(`[data-msg-id="${targetMessageId}"]`);
        if (targetEl) {
          focusMessageElement(targetEl);
        }
        pendingScrollTarget = null;
      }, 100);
      
      updateScrollToBottomBtn();
    });
    
    function updateScrollToBottomBtn() {
      let btn = document.getElementById('scrollToBottomBtn');
      if (!btn) {
        btn = document.createElement('button');
        btn.id = 'scrollToBottomBtn';
        btn.innerHTML = '↓ 최신 메시지';
        btn.style.cssText = 'position:absolute;bottom:70px;right:20px;z-index:100;background:#3390ec;color:white;border:none;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.2);transition:opacity 0.3s;';
        btn.onclick = () => focusLastMessage();
        document.querySelector('.chat-area')?.appendChild(btn);
      }
      // replyStack 있으면 "↩ 돌아가기" 표시
      btn.innerHTML = replyStack.length > 0 ? '↩ 돌아가기' : '↓ 최신 메시지';
    }
    
    function removeScrollToBottomBtn() {
      const btn = document.getElementById('scrollToBottomBtn');
      if (btn) btn.remove();
      replyStack = [];
    }
    
    // ========== v1.0: 채팅 내 검색 ==========
    let chatSearchResults = [];
    let chatSearchIdx = -1;
    let chatSearchTimer = null;
    
    function toggleChatSearch() {
      const bar = document.getElementById('chatSearchBar');
      if (bar.style.display === 'none') {
        bar.style.display = 'flex';
        document.getElementById('chatSearchInput').focus();
      } else {
        closeChatSearch();
      }
    }
    
    function openChatSearchWith(query) {
      if (!currentChatId) return;
      const bar = document.getElementById('chatSearchBar');
      bar.style.display = 'flex';
      const input = document.getElementById('chatSearchInput');
      input.value = query;
      input.focus();
      doChatSearch();
    }
    
    function closeChatSearch() {
      document.getElementById('chatSearchBar').style.display = 'none';
      document.getElementById('chatSearchInput').value = '';
      document.getElementById('chatSearchCount').textContent = '';
      chatSearchResults = [];
      chatSearchIdx = -1;
      // 하이라이트 제거
      document.querySelectorAll('.search-highlight, .search-highlight-current').forEach(el => {
        el.replaceWith(el.textContent);
      });
    }
    
    function doChatSearchDebounced() {
      clearTimeout(chatSearchTimer);
      chatSearchTimer = setTimeout(doChatSearch, 300);
    }
    
    function doChatSearch() {
      const query = document.getElementById('chatSearchInput').value.trim();
      if (!query || !currentChatId) {
        document.getElementById('chatSearchCount').textContent = '';
        chatSearchResults = [];
        return;
      }
      
      // 서버 API로 검색
      fetch(`/api/search?q=${encodeURIComponent(query)}&chat_id=${currentChatId}&limit=50`)
        .then(r => r.json())
        .then(data => {
          chatSearchResults = data.messages || [];
          chatSearchIdx = chatSearchResults.length > 0 ? 0 : -1;
          document.getElementById('chatSearchCount').textContent = 
            chatSearchResults.length > 0 ? `${1}/${chatSearchResults.length}` : '0건';
          
          // 첫 번째 결과로 이동
          if (chatSearchResults.length > 0) {
            highlightSearchResult();
          }
        })
        .catch(() => {
          document.getElementById('chatSearchCount').textContent = '오류';
        });
    }
    
    function chatSearchNav(dir) {
      if (chatSearchResults.length === 0) return;
      chatSearchIdx = (chatSearchIdx + dir + chatSearchResults.length) % chatSearchResults.length;
      document.getElementById('chatSearchCount').textContent = 
        `${chatSearchIdx + 1}/${chatSearchResults.length}`;
      highlightSearchResult();
    }
    
    function highlightSearchResult() {
      if (chatSearchIdx < 0 || chatSearchIdx >= chatSearchResults.length) return;
      const result = chatSearchResults[chatSearchIdx];
      
      // 해당 메시지가 현재 DOM에 있으면 스크롤
      const msgEl = document.querySelector(`[data-msg-id="${result.id}"]`);
      if (msgEl) {
        msgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        // 짧은 플래시 효과
        msgEl.style.transition = 'background 0.3s';
        msgEl.style.background = 'rgba(51,144,236,0.15)';
        setTimeout(() => { msgEl.style.background = ''; }, 1500);
      }
    }
    
    // ========== v1.0: 멘션 자동완성 ==========
    let mentionMode = false;
    let mentionQuery = '';
    let mentionStartPos = -1;
    let mentionMembers = [];
    let mentionSelectedIdx = 0;
    let membersCache = {}; // chatId -> members
    
    // 입력 시 @ 감지
    // v1.2: Draft 실시간 저장 (telegram-tt 패턴)
    // 참조: telegram-tt Composer.tsx — input 이벤트에서 debounced saveDraft
    let draftSaveTimer = null;
    const DRAFT_SAVE_DELAY = 500; // 0.5초 디바운싱

    const messageInput = document.getElementById('messageInput');
    messageInput.addEventListener('input', (e) => {
      const val = messageInput.value;
      const cursorPos = messageInput.selectionStart;

      // v1.2: Draft 실시간 저장 (디바운싱)
      // telegram-tt는 입력할 때마다 saveDraft 호출 (디바운스 적용)
      clearTimeout(draftSaveTimer);
      draftSaveTimer = setTimeout(() => {
        if (!currentChatId) return;
        const draftText = val.trim();
        if (draftText) {
          draftMessages[currentChatId] = draftText;
        } else {
          delete draftMessages[currentChatId];
        }
      }, DRAFT_SAVE_DELAY);

      // @ 뒤의 텍스트 추출
      const beforeCursor = val.substring(0, cursorPos);
      const atMatch = beforeCursor.match(/@(\S*)$/);

      if (atMatch) {
        mentionMode = true;
        mentionQuery = atMatch[1].toLowerCase();
        mentionStartPos = cursorPos - atMatch[0].length;

        // 캐시된 멤버가 있으면 즉시 필터링, 없으면 서버 요청
        if (membersCache[currentChatId]) {
          filterAndShowMentions(membersCache[currentChatId]);
        } else {
          socket.emit('searchMembers', { chatId: currentChatId, query: '' });
        }
      } else {
        closeMentionPopup();
      }
    });
    
    // 멤버 목록 수신
    socket.on('members', (payload) => {
      if (payload && payload.account && payload.account !== activeAccountId) return;
      const { chatId, members } = payload || {};
      membersCache[chatId] = members;
      if (mentionMode && chatId === currentChatId) {
        filterAndShowMentions(members);
      }
    });
    
    function filterAndShowMentions(members) {
      const filtered = members.filter(m => {
        if (!mentionQuery) return true;
        return m.name.toLowerCase().includes(mentionQuery) || 
               m.username.toLowerCase().includes(mentionQuery);
      }).slice(0, 8);
      
      mentionMembers = filtered;
      mentionSelectedIdx = 0;
      
      if (filtered.length === 0) {
        closeMentionPopup();
        return;
      }
      
      const avatarColors = ['#c03d33','#4fad2d','#d09306','#168acd','#8544d6','#cd4073','#2996ad','#ce671b'];
      
      const listEl = document.getElementById('mentionList');
      listEl.innerHTML = filtered.map((m, i) => {
        const initial = Array.from(m.name || '?')[0];
        const bg = avatarColors[Math.abs(m.userId) % avatarColors.length];
        return `<div class="mention-item${i === 0 ? ' active' : ''}" data-idx="${i}" onclick="selectMention(${i})">
          <div class="mention-item-avatar" style="background: ${bg};">${initial}</div>
          <div class="mention-item-info">
            <div class="mention-item-name">${escapeHtml(m.name)}</div>
            ${m.username ? `<div class="mention-item-username">@${escapeHtml(m.username)}</div>` : ''}
          </div>
        </div>`;
      }).join('');
      
      document.getElementById('mentionPopup').style.display = 'block';
    }
    
    function selectMention(idx) {
      const m = mentionMembers[idx];
      if (!m) return;
      
      const val = messageInput.value;
      const insertText = m.username ? `@${m.username} ` : m.name + ' ';
      const newVal = val.substring(0, mentionStartPos) + insertText + val.substring(messageInput.selectionStart);
      messageInput.value = newVal;
      messageInput.selectionStart = messageInput.selectionEnd = mentionStartPos + insertText.length;
      messageInput.focus();
      closeMentionPopup();
    }
    
    function closeMentionPopup() {
      mentionMode = false;
      mentionMembers = [];
      document.getElementById('mentionPopup').style.display = 'none';
    }
    
    // 키보드 네비게이션 (멘션 팝업 활성 시)
    const origKeyDown = messageInput.onkeydown;
    messageInput.addEventListener('keydown', (e) => {
      if (!mentionMode || mentionMembers.length === 0) return;
      
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        mentionSelectedIdx = Math.max(0, mentionSelectedIdx - 1);
        updateMentionSelection();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        mentionSelectedIdx = Math.min(mentionMembers.length - 1, mentionSelectedIdx + 1);
        updateMentionSelection();
      } else if (e.key === 'Enter' || e.key === 'Tab') {
        e.preventDefault();
        e.stopPropagation();
        selectMention(mentionSelectedIdx);
      } else if (e.key === 'Escape') {
        closeMentionPopup();
      }
    }, true);  // capture phase로 handleKeyDown보다 먼저 실행
    
    function updateMentionSelection() {
      document.querySelectorAll('.mention-item').forEach((el, i) => {
        el.classList.toggle('active', i === mentionSelectedIdx);
      });
      // 선택된 항목으로 스크롤
      const activeEl = document.querySelector('.mention-item.active');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
    }
    
    // 드래그앤드롭
    const dropOverlay = document.getElementById('dropOverlay');
    let dragCounter = 0;
    
    document.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      if (currentChatId) {
        dropOverlay.classList.remove('hidden');
      }
    });
    
    document.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter === 0) {
        dropOverlay.classList.add('hidden');
      }
    });
    
    document.addEventListener('dragover', (e) => {
      e.preventDefault();
    });
    
    document.addEventListener('drop', (e) => {
      e.preventDefault();
      dragCounter = 0;
      dropOverlay.classList.add('hidden');
      
      if (!currentChatId) return;
      
      const file = e.dataTransfer.files[0];
      if (file) {
        // 이미지인 경우 이미지 처리
        if (file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = async (ev) => {
            const compressed = await compressImage(ev.target.result);
            pendingImage = compressed;
            document.getElementById('imagePreview').classList.remove('hidden');
            document.getElementById('previewImg').src = pendingImage;
          };
          reader.readAsDataURL(file);
        } else {
          // 파일 처리
          if (file.size > 50 * 1024 * 1024) {
            alert('파일 크기는 50MB를 초과할 수 없습니다.');
            return;
          }
          pendingFile = file;
          document.getElementById('filePreview').classList.remove('hidden');
          document.getElementById('filePreviewName').textContent = file.name;
          document.getElementById('filePreviewSize').textContent = '(' + formatFileSize(file.size) + ')';
        }
      }
    });
  </script>
</body>
